<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NB-918374 - Inventário TI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#eef2f6;
}

/* ===== HEADER ===== */

.header{
    background:#ff9100;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.header img{
    height:50px;
}

/* ===== CONTAINER ===== */

.container{
    display:flex;
    justify-content:center;
    padding:30px 15px;
}

/* ===== CARD ===== */

.card{
    background:white;
    width:420px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    overflow:hidden;
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1;}
}

.title{
    text-align:center;
    background:#f7f9fc;
    padding:15px;
    font-size:22px;
    font-weight:700;
    color:#0b3b75;
}

.equipamento{
    width:100%;
    display:block;
}

.info{
    padding:20px;
}

.info p{
    margin:10px 0;
    font-size:16px;
}

.label{
    font-weight:600;
    color:#0b3b75;
}

/* ===== ALERTA ===== */

.alerta{
    margin:15px 20px 20px;
    padding:15px;
    background:#fff3cd;
    border-left:6px solid #ffc107;
    border-radius:8px;
    font-size:15px;
}

/* ===== RODAPÉ ===== */

.footer{
    text-align:center;
    padding:15px;
    font-size:13px;
    color:#777;
}

</style>
</head>

<body>

<div class="header">
<img src="URL_DO_LOGO_AQUI">
</div>

<div class="container">

<div class="card">

<div class="title">
💻 NB-918374
</div>

<img class="equipamento" src="URL_DA_IMAGEM_NOTEBOOK">

<div class="info">
<p><span class="label">Modelo:</span> Notebook VAIO Sony</p>
<p><span class="label">Setor:</span> CPD</p>
<p><span class="label">Status:</span> Em uso</p>
</div>

<div class="alerta">
⚠️ Notebook funciona apenas conectado ao carregador.
</div>

</div>

</div>

<div class="footer">
Inventário TI • Nordeste
</div>

</body>
</html>
